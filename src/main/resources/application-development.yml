spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    hibernate:
      ddl-auto: create-drop
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  docker:
    compose:
      stop:
        command: down
logging:
  level:
    org:
      springframework:
        security: trace
  file:
    path: var/log/
